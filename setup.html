<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Setup - Pobitra Ghee</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; text-align: center; }
    .card h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .card p { color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; }
    .form-group input:focus { outline: none; border-color: #d4a853; }
    button { width: 100%; padding: 14px; background: #d4a853; color: #0f172a; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
    button:hover { background: #e2bc6a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
    .msg--success { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
    .msg--error { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
    .warning { background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Setup</h1>
    <p>Create your admin account for the dashboard</p>
    <div class="warning">Delete this file after setup for security.</div>
    <form id="setupForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="admin@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="Min 6 characters">
      </div>
      <button type="submit" id="submitBtn">Create Admin Account</button>
    </form>
    <div id="msg" class="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    var supabaseUrl = 'https://svpgzhlfslfuuddubxgo.supabase.co';
    var supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2cGd6aGxmc2xmdXVkZHVieGdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMzMyODEsImV4cCI6MjA5NDkwOTI4MX0.jO5Jsaif5TnJES23LRuXLS5u1d_BABgu-Bb9XCDajqM';
    var db = window.supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById('setupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var btn = document.getElementById('submitBtn');
      var msg = document.getElementById('msg');

      btn.disabled = true;
      btn.textContent = 'Creating...';
      msg.style.display = 'none';

      var { data, error } = await db.auth.signUp({ email: email, password: password });

      if (error) {
        msg.className = 'msg msg--error';
        msg.textContent = error.message;
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Admin Account';
      } else {
        msg.className = 'msg msg--success';
        msg.textContent = 'Admin account created! You can now log in at admin.html';
        msg.style.display = 'block';
        btn.textContent = 'Done!';
      }
    });
  </script>
</body>
</html>
